name: zinde_ai
description: Türk mutfağına özel akıllı beslenme planlama sistemi. LLM + algoritma, Groq entegrasyonu ve n8n otomasyon.

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Camera ve Image işleme
  camera: ^0.10.5+5
  image_picker: ^1.0.4
  image: ^4.1.3
  
  # HTTP ve API
  http: ^1.1.0
  
  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  firebase_remote_config: ^4.3.8
  
  # UI
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
